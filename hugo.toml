baseURL = "https://parsarajaee.ir/"
languageCode = "fa"
title = "نوشته‌های پارسا رجائی"
theme = "PaperMod"
defaultContentLanguage = "fa"

[languages.fa]
  languageName = "فارسی"
  languagedirection = "rtl"
  weight = 1

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

enableRobotsTXT = true

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[related]
threshold = 80
includeNewer = true

[[related.indices]]
name = "categories"
weight = 100

[[related.indices]]
name = "tags"
weight = 80

[menu]
  [[menu.main]]
    identifier = "about"
    name = "درباره من"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "تگ‌ها"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "آرشیو"
    url = "/archives/"
    weight = 30

[params]
  disqusShortname = ""
  comments = true
  mainSections = ["posts"]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true

